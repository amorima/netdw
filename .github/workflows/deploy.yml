# Definição do evento de acionamento do fluxo de trabalho contínuo
name: Deploy SSR
on:
  push:
    branches:
      - main
  workflow_dispatch:

# Declaração dos trabalhos a executar no agente local
jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - name: Obtenção do código fonte
        uses: actions/checkout@v4

      - name: Diagnóstico do runner
        run: |
          whoami
          pwd
          node -v
          npm -v

      - name: Instalação de dependências
        run: npm ci

      - name: Build SSR
        run: npm run build

      - name: Publicação da aplicação
        run: |
          set -e
          mkdir -p /var/www/netdw/app
          rsync -a --delete \
            --exclude '.git' \
            --exclude 'node_modules' \
            --exclude '.nuxt' \
            --exclude '.output' \
            ./ /var/www/netdw/app/
          rm -rf /var/www/netdw/app/.output
          cp -r .output /var/www/netdw/app/

      - name: Escrever .env de produção
        run: |
          cat <<EOF > /var/www/netdw/app/.env
          NUXT_DIRECTUS_URL=${{ secrets.NUXT_DIRECTUS_URL }}
          NUXT_DIRECTUS_TOKEN=${{ secrets.NUXT_DIRECTUS_TOKEN }}
          NUXT_DIRECTUS_CONTACT_COLLECTION=${{ secrets.NUXT_DIRECTUS_CONTACT_COLLECTION }}
          NUXT_DIRECTUS_INSCRICAO_COLLECTION=${{ secrets.NUXT_DIRECTUS_INSCRICAO_COLLECTION }}
          NUXT_IAEDU_API_ENDPOINT=${{ secrets.NUXT_IAEDU_API_ENDPOINT }}
          NUXT_IAEDU_API_KEY=${{ secrets.NUXT_IAEDU_API_KEY }}
          NUXT_IAEDU_CHANNEL_ID=${{ secrets.NUXT_IAEDU_CHANNEL_ID }}
          NUXT_IAEDU_DEFAULT_THREAD_ID=${{ secrets.NUXT_IAEDU_DEFAULT_THREAD_ID }}
          NUXT_CONTACT_MIN_FILL_TIME_MS=${{ secrets.NUXT_CONTACT_MIN_FILL_TIME_MS }}
          NUXT_CONTACT_RATE_LIMIT_WINDOW_MS=${{ secrets.NUXT_CONTACT_RATE_LIMIT_WINDOW_MS }}
          NUXT_CONTACT_RATE_LIMIT_MAX_REQUESTS=${{ secrets.NUXT_CONTACT_RATE_LIMIT_MAX_REQUESTS }}
          NUXT_INSCRICAO_MIN_FILL_TIME_MS=${{ secrets.NUXT_INSCRICAO_MIN_FILL_TIME_MS }}
          NUXT_INSCRICAO_RATE_LIMIT_WINDOW_MS=${{ secrets.NUXT_INSCRICAO_RATE_LIMIT_WINDOW_MS }}
          NUXT_INSCRICAO_RATE_LIMIT_MAX_REQUESTS=${{ secrets.NUXT_INSCRICAO_RATE_LIMIT_MAX_REQUESTS }}
          EOF

      - name: Instalar dependências de runtime
        run: |
          set -e
          cd /var/www/netdw/app
          npm ci --omit=dev

      - name: Reiniciar serviço netdw
        run: |
          set -e
          cd /var/www/netdw/app

          if [ "$(id -u)" -eq 0 ]; then
            systemctl daemon-reload
            systemctl restart netdw
            systemctl status netdw --no-pager -l
          elif command -v sudo >/dev/null 2>&1 && sudo -n true >/dev/null 2>&1; then
            sudo -n systemctl daemon-reload
            sudo -n systemctl restart netdw
            sudo -n systemctl status netdw --no-pager -l
          else
            echo "Runner sem permissões de systemd, a usar fallback com pm2."
            set -a
            . /var/www/netdw/app/.env
            set +a

            npx --yes pm2 describe netdw >/dev/null 2>&1 \
              && npx --yes pm2 restart netdw --update-env \
              || npx --yes pm2 start .output/server/index.mjs --name netdw --cwd /var/www/netdw/app --time

            npx --yes pm2 save
            npx --yes pm2 list
          fi

      - name: Verificar health do chatbot
        run: |
          sleep 2
          curl -fsv http://127.0.0.1:3000/api/chatbot-health
